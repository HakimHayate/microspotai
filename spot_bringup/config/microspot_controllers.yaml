controller_manager:
  ros__parameters:
    update_rate: 50 # Hz 

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    raw_position_bridge:
      type: position_controllers/JointGroupPositionController

raw_position_bridge:
  ros__parameters:
    joints:
      - front_right_hip_joint
      - front_right_thigh_joint
      - front_right_knee_joint
      - back_right_hip_joint
      - back_right_thigh_joint
      - back_right_knee_joint
      - back_left_hip_joint
      - back_left_thigh_joint
      - back_left_knee_joint
      - front_left_hip_joint
      - front_left_thigh_joint
      - front_left_knee_joint